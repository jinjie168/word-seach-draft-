<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Voyage</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
  /* ===================== 设计变量 (design tokens) ===================== */
  :root{
    --cream:#fff8ec;
    --ink:#1c2b4a;
    --ink-soft:#3a4a6b;
    --gold:#f6b93b;
    --gold-deep:#c9791a;
    --sky:#49c6e0;
    --sky-deep:#1e7f96;
    --blush:#ff7096;
    --glass-bg:rgba(255,255,255,0.86);
    --glass-border:rgba(255,255,255,0.55);
    --shadow-soft:0 10px 30px rgba(28,43,74,0.25);
    --radius-lg:28px;
    --radius-md:18px;
    --radius-sm:12px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{margin:0; padding:0; height:100%; overflow:hidden; font-family:'Nunito',sans-serif; background:#000;}
  #app{position:relative; width:100%; height:100vh; height:100dvh; overflow:hidden;}

  /* ===================== 背景层 (background layer) ===================== */
  .bg-layer{position:absolute; inset:0; z-index:0; overflow:hidden;}
  .bg-photo{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; transition:opacity .6s ease;}
  .bg-tint{position:absolute; inset:0; mix-blend-mode:multiply; opacity:.3; transition:background 1s ease;}
  .bg-vignette{position:absolute; inset:0; background:linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0) 30%, rgba(0,0,0,0) 55%, rgba(15,20,35,0.55) 100%);}
  /* 遮住相片左下角嘅日期/地点浮水印 */
  .bg-corner-mask{position:absolute; left:0; bottom:0; width:60%; height:18%; background:radial-gradient(ellipse at 0% 100%, rgba(8,10,16,0.92) 0%, rgba(8,10,16,0.6) 40%, rgba(8,10,16,0) 75%);}

  /* ===================== 通用玻璃组件 (glass components) ===================== */
  .glass{
    background:var(--glass-bg);
    backdrop-filter:blur(14px) saturate(140%);
    -webkit-backdrop-filter:blur(14px) saturate(140%);
    border:1px solid var(--glass-border);
    box-shadow:var(--shadow-soft);
  }
  .pill{border-radius:999px; display:flex; align-items:center; gap:8px; padding:8px 16px 8px 8px;}
  .pill .icon-circle{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; box-shadow:inset 0 -2px 4px rgba(0,0,0,0.15), 0 2px 4px rgba(0,0,0,0.2);}
  .pill .icon-circle.coin{background:radial-gradient(circle at 35% 30%, #ffe9a8, var(--gold) 60%, var(--gold-deep) 100%);}
  .pill .icon-circle.bulb{background:radial-gradient(circle at 35% 30%, #d6f7ff, var(--sky) 60%, var(--sky-deep) 100%);}
  .pill .value{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:19px; color:var(--ink); min-width:20px;}
  .icon-btn{width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:22px; cursor:pointer; border:none; color:var(--ink);}
  .icon-btn:active{transform:scale(.92);}
  .icon-btn .sub{position:absolute; bottom:-7px; font-family:'Baloo 2'; font-weight:700; font-size:12px; background:var(--ink); color:#fff; padding:1px 7px; border-radius:10px;}

  /* ===================== 开始画面 (start screen) ===================== */
  #screen-start{position:absolute; inset:0; z-index:5; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:24px;}
  .logo-badge{width:96px; height:96px; border-radius:28px; background:linear-gradient(160deg,#fff6de,var(--gold) 55%,var(--gold-deep)); display:flex; align-items:center; justify-content:center; font-size:44px; box-shadow:0 14px 30px rgba(0,0,0,0.35), inset 0 -6px 10px rgba(0,0,0,0.15); margin-bottom:22px;}
  .title{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:44px; color:#fff; text-shadow:0 4px 18px rgba(0,0,0,0.45); letter-spacing:.5px; margin:0;}
  .subtitle{font-family:'Nunito'; font-weight:700; font-size:15px; color:#fff; opacity:.9; letter-spacing:3px; text-transform:uppercase; margin:6px 0 40px;}
  #btn-start{font-family:'Baloo 2'; font-weight:700; font-size:22px; color:#5a3300; background:linear-gradient(180deg,#ffe27a,var(--gold) 55%,var(--gold-deep)); border:none; padding:18px 56px; border-radius:999px; box-shadow:0 10px 0 #a8620f, 0 16px 26px rgba(0,0,0,0.35); cursor:pointer; letter-spacing:1px;}
  #btn-start:active{transform:translateY(6px); box-shadow:0 4px 0 #a8620f, 0 8px 14px rgba(0,0,0,0.3);}

  /* ===================== 顶部HUD (top HUD) ===================== */
  #hud-top{position:absolute; top:18px; left:18px; right:18px; z-index:4; display:flex; align-items:center; justify-content:space-between; gap:12px;}
  #hud-left{display:flex; gap:10px;}
  #progress-wrap{flex:1; max-width:340px; display:flex; flex-direction:column; align-items:center; gap:4px;}
  #progress-label{font-family:'Baloo 2'; font-size:11px; letter-spacing:2px; color:#fff; text-shadow:0 2px 6px rgba(0,0,0,0.4); text-transform:uppercase;}
  #progress-track{position:relative; width:100%; height:16px; border-radius:999px; background:rgba(20,25,40,0.45); border:1px solid rgba(255,255,255,0.35); overflow:visible;}
  #progress-fill{height:100%; border-radius:999px; background:linear-gradient(90deg,#7be7c1,var(--sky)); transition:width .5s cubic-bezier(.2,.8,.3,1);}
  #progress-gift{position:absolute; right:-4px; top:50%; transform:translateY(-50%); font-size:22px; filter:drop-shadow(0 3px 4px rgba(0,0,0,0.4));}

  /* ===================== 游戏画面 (game screen) ===================== */
  #screen-game{position:absolute; inset:0; z-index:1; display:none;}
  #level-tag{position:absolute; top:64px; left:50%; transform:translateX(-50%); font-family:'Baloo 2'; font-weight:700; font-size:13px; color:#fff; background:rgba(20,25,40,0.4); padding:4px 16px; border-radius:999px; letter-spacing:2px; text-transform:uppercase; z-index:4;}

  #grid-area{position:absolute; left:6%; top:38%; transform:translateY(-50%); z-index:2; display:grid; gap:8px;}
  .tile{width:58px; height:58px; border-radius:14px; position:relative; display:flex; align-items:center; justify-content:center;}
  .tile.blank{background:linear-gradient(180deg,#fffdf7,#fbeed8); box-shadow:0 4px 0 rgba(150,110,50,0.35), inset 0 2px 3px rgba(255,255,255,0.8), 0 6px 10px rgba(0,0,0,0.18);}
  .tile.empty{background:transparent; box-shadow:none;}
  .tile .letter{font-family:'Baloo 2'; font-weight:800; font-size:26px; color:var(--ink); opacity:0; transform:scale(.4); transition:all .35s cubic-bezier(.2,1.4,.4,1);}
  .tile.revealed .letter{opacity:1; transform:scale(1);}
  .tile .peek{position:absolute; font-size:14px; opacity:.55; filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));}
  .tile.revealed .peek{display:none;}
  .tile.bounce{animation:tileBounce .5s;}
  @keyframes tileBounce{0%{transform:scale(1);}35%{transform:scale(1.18);}100%{transform:scale(1);}}

  #wheel-zone{position:absolute; right:6%; top:56%; transform:translateY(-50%); z-index:3; display:flex; flex-direction:column; align-items:center;}
  #word-preview{min-height:34px; margin-bottom:10px; font-family:'Baloo 2'; font-weight:700; font-size:24px; letter-spacing:4px; color:#fff; text-shadow:0 3px 10px rgba(0,0,0,0.5);}
  #wheel-outer{position:relative; width:220px; height:220px;}
  #wheel-circle{position:absolute; inset:0; border-radius:50%; background:radial-gradient(circle at 32% 28%, #ffffff, #f4ecd8 70%, #ece0c4); box-shadow:0 18px 34px rgba(0,0,0,0.4), inset 0 -8px 16px rgba(180,140,70,0.25), inset 0 6px 10px rgba(255,255,255,0.9);}
  #wheel-svg{position:absolute; inset:0; width:100%; height:100%; pointer-events:none;}
  #wheel-svg polyline{fill:none; stroke:var(--sky-deep); stroke-width:6; stroke-linecap:round; stroke-linejoin:round; opacity:.85;}
  .letter-btn{position:absolute; width:56px; height:56px; margin:-28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'Baloo 2'; font-weight:800; font-size:26px; color:var(--ink); cursor:pointer; transition:transform .12s;}
  .letter-btn.active{background:radial-gradient(circle at 35% 30%,#fff2c4,var(--gold)); color:#5a3300; transform:scale(1.12); box-shadow:0 6px 14px rgba(0,0,0,0.3);}
  #wheel-shuffle{position:absolute; left:50%; top:50%; width:44px; height:44px; margin:-22px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:20px; color:#9a8a6a; cursor:pointer; background:rgba(255,255,255,0.5);}
  #wheel-shuffle:active{transform:scale(.9) rotate(120deg); transition:transform .3s;}

  #hint-btn{position:absolute; left:-64px; top:6px;}
  #hint-btn .icon-circle-lg{width:56px; height:56px; border-radius:50%; background:linear-gradient(180deg,#2b3552,#151c30); display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--sky); box-shadow:0 8px 16px rgba(0,0,0,0.35); position:relative;}
  #hint-btn .icon-circle-lg span.n{font-family:'Baloo 2'; font-weight:800; font-size:13px; color:#fff;}
  #spin-launcher{position:absolute; left:-64px; bottom:6px;}
  #spin-launcher .icon-circle-lg{width:56px; height:56px; border-radius:50%; background:linear-gradient(180deg,#2b3552,#151c30); display:flex; align-items:center; justify-content:center; color:var(--blush); box-shadow:0 8px 16px rgba(0,0,0,0.35); font-size:24px;}

  /* ===================== 弹窗 (modals) ===================== */
  .modal-backdrop{position:absolute; inset:0; background:rgba(10,14,26,0.55); z-index:10; display:none; align-items:center; justify-content:center; padding:24px;}
  .modal-card{width:100%; max-width:380px; border-radius:var(--radius-lg); padding:26px 22px 22px; text-align:center; position:relative;}
  .modal-card .close-x{position:absolute; top:14px; right:16px; font-size:20px; color:var(--ink-soft); cursor:pointer; background:none; border:none;}
  .modal-title{font-family:'Baloo 2'; font-weight:800; font-size:22px; color:var(--ink); letter-spacing:1px; margin:0 0 16px;}

  /* settings */
  .settings-row{display:flex; justify-content:center; gap:16px; margin-top:6px;}
  .settings-row .icon-btn{background:linear-gradient(180deg,#6fb3f0,#3b7fd1); color:#fff; box-shadow:0 5px 0 #2b5f9e;}
  .settings-row .icon-btn.green{background:linear-gradient(180deg,#8de3a4,#4bb56f); box-shadow:0 5px 0 #2f8850;}

  /* spin wheel modal */
  #spin-wheel-wrap{position:relative; width:250px; height:250px; margin:10px auto 22px;}
  #spin-wheel-svg{width:100%; height:100%; transition:transform 3.2s cubic-bezier(.15,.85,.25,1);}
  #spin-pointer{position:absolute; top:-8px; left:50%; transform:translateX(-50%); font-size:26px; filter:drop-shadow(0 3px 3px rgba(0,0,0,.4)); z-index:2;}
  #btn-spin{font-family:'Baloo 2'; font-weight:700; font-size:17px; color:#fff; border:none; width:100%; padding:15px; border-radius:999px; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;}
  #btn-spin.free{background:linear-gradient(180deg,#8de3a4,#3fa563); box-shadow:0 6px 0 #2c7c48;}
  #btn-spin.ad{background:linear-gradient(180deg,#6fb3f0,#3b7fd1); box-shadow:0 6px 0 #2b5f9e;}
  #btn-spin:active{transform:translateY(5px); box-shadow:none;}

  /* gift / level complete */
  .reward-row{display:flex; justify-content:center; gap:18px; margin:18px 0 22px;}
  .reward-chip{display:flex; flex-direction:column; align-items:center; gap:6px;}
  .reward-chip .icon-circle{width:52px; height:52px; font-size:24px;}
  .reward-chip .amt{font-family:'Baloo 2'; font-weight:800; font-size:17px; color:var(--ink);}
  .btn-primary{font-family:'Baloo 2'; font-weight:700; font-size:18px; color:#5a3300; background:linear-gradient(180deg,#ffe27a,var(--gold) 55%,var(--gold-deep)); border:none; padding:14px 40px; border-radius:999px; box-shadow:0 7px 0 #a8620f; cursor:pointer;}
  .btn-primary:active{transform:translateY(5px); box-shadow:none;}

  #toast{position:absolute; top:100px; left:50%; transform:translateX(-50%) translateY(-14px); z-index:20; padding:10px 22px; border-radius:999px; font-family:'Baloo 2'; font-weight:700; font-size:14px; color:var(--ink); opacity:0; transition:all .3s; pointer-events:none;}
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  @media (max-width:640px){
    .tile{width:46px; height:46px;}
    .tile .letter{font-size:21px;}
    #wheel-outer{width:190px; height:190px;}
    .letter-btn{width:48px; height:48px; margin:-24px; font-size:22px;}
    #grid-area{left:5%;}
    #wheel-zone{right:4%;}
    #hint-btn,#spin-launcher{left:-58px;}
  }
</style>
</head>
<body>
<div id="app">

  <div class="bg-layer">
    <img id="bg-photo-a" class="bg-photo" src="" alt="">
    <div id="bg-tint" class="bg-tint"></div>
    <div class="bg-vignette"></div>
    <div class="bg-corner-mask"></div>
  </div>

  <!-- ================= START SCREEN ================= -->
  <div id="screen-start">
    <div class="logo-badge">🔤</div>
    <h1 class="title">WORD VOYAGE</h1>
    <p class="subtitle">100 Levels &middot; Connect &amp; Collect</p>
    <button id="btn-start">START GAME</button>
  </div>

  <!-- ================= TOP HUD ================= -->
  <div id="hud-top">
    <div id="hud-left">
      <div class="pill glass"><span class="icon-circle coin">🪙</span><span class="value" id="coin-count">0</span></div>
      <div class="pill glass"><span class="icon-circle bulb">💡</span><span class="value" id="bulb-count">0</span></div>
    </div>
    <div id="progress-wrap">
      <span id="progress-label">Voyage Progress</span>
      <div id="progress-track"><div id="progress-fill" style="width:0%"></div><span id="progress-gift">🎁</span></div>
    </div>
    <button class="icon-btn glass" id="btn-settings">⚙️</button>
  </div>

  <!-- ================= GAME SCREEN ================= -->
  <div id="screen-game">
    <div id="level-tag">Level 1</div>
    <div id="grid-area"></div>

    <div id="wheel-zone">
      <div id="word-preview"></div>
      <div id="wheel-outer">
        <div id="hint-btn">
          <div class="icon-circle-lg" id="btn-hint">💡<span class="n" id="hint-cost">1</span></div>
        </div>
        <div id="spin-launcher">
          <div class="icon-circle-lg" id="btn-spin-open">🎡</div>
        </div>
        <div id="wheel-circle"></div>
        <svg id="wheel-svg" viewBox="0 0 220 220"><polyline id="wheel-line" points=""></polyline></svg>
        <div id="wheel-letters"></div>
        <div id="wheel-shuffle">🔀</div>
      </div>
    </div>
  </div>

  <div id="toast" class="glass"></div>

  <!-- ================= SETTINGS MODAL ================= -->
  <div class="modal-backdrop" id="modal-settings">
    <div class="modal-card glass">
      <button class="close-x" data-close="modal-settings">✕</button>
      <p class="modal-title">Settings</p>
      <div class="settings-row">
        <button class="icon-btn" id="btn-home">🏠</button>
        <button class="icon-btn green" id="btn-sound">🔊</button>
        <button class="icon-btn green" id="btn-music">🎵</button>
      </div>
    </div>
  </div>

  <!-- ================= SPIN MODAL ================= -->
  <div class="modal-backdrop" id="modal-spin">
    <div class="modal-card glass">
      <button class="close-x" data-close="modal-spin">✕</button>
      <p class="modal-title">Lucky Spin</p>
      <div id="spin-wheel-wrap">
        <span id="spin-pointer">🔻</span>
        <svg id="spin-wheel-svg" viewBox="0 0 200 200"></svg>
      </div>
      <button id="btn-spin"></button>
    </div>
  </div>

  <!-- ================= MYSTERY GIFT MODAL ================= -->
  <div class="modal-backdrop" id="modal-gift">
    <div class="modal-card glass">
      <p class="modal-title">Mystery Gift!</p>
      <div style="font-size:52px;">🎁</div>
      <div class="reward-row" id="gift-rewards"></div>
      <button class="btn-primary" id="btn-gift-claim">CLAIM</button>
    </div>
  </div>

  <!-- ================= LEVEL COMPLETE MODAL ================= -->
  <div class="modal-backdrop" id="modal-complete">
    <div class="modal-card glass">
      <p class="modal-title">Level Complete!</p>
      <div style="font-size:46px;">⭐</div>
      <div class="reward-row" id="complete-rewards"></div>
      <button class="btn-primary" id="btn-next-level">CONTINUE</button>
    </div>
  </div>

</div>

/* =================================================================
   音效引擎 (AUDIO ENGINE) —— 全部用 Web Audio 实时合成，唔连任何外部音乐/音效档案，
   保证唔会因为link断咗而变哑
   ================================================================= */
const AudioEngine = {
  ctx:null,
  sfxOn: store.get('sfxOn', true),
  musicOn: store.get('musicOn', true),
  musicTimer:null, musicStep:0,
  init(){
    if(this.ctx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    this.ctx = new AC();
  },
  tone(freq, dur, {type='sine', gain=0.18, delay=0, slideTo=null}={}){
    if(!this.sfxOn || !this.ctx) return;
    const t0 = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = type; osc.frequency.setValueAtTime(freq, t0);
    if(slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0+dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(gain, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(g); g.connect(this.ctx.destination);
    osc.start(t0); osc.stop(t0+dur+0.05);
  },
  playTap(){ this.tone(520,0.08,{type:'triangle', gain:0.14}); },
  playCorrect(){
    [523.25,659.25,783.99].forEach((f,i)=> this.tone(f,0.18,{type:'sine', gain:0.2, delay:i*0.07}));
  },
  playWrong(){ this.tone(180,0.22,{type:'sawtooth', gain:0.12, slideTo:110}); },
  playCoin(){ this.tone(1046,0.1,{type:'square', gain:0.12}); this.tone(1568,0.12,{type:'square', gain:0.1, delay:0.06}); },
  playBulb(){ this.tone(880,0.12,{type:'sine', gain:0.16}); this.tone(1318,0.16,{type:'sine', gain:0.14, delay:0.08}); },
  playLevelComplete(){
    [523.25,659.25,783.99,1046.5].forEach((f,i)=> this.tone(f,0.28,{type:'triangle', gain:0.22, delay:i*0.1}));
  },
  playGift(){
    [659.25,783.99,987.77,1318.5].forEach((f,i)=> this.tone(f,0.22,{type:'sine', gain:0.2, delay:i*0.08}));
  },
  musicPattern:[261.6,329.6,392.0,329.6, 293.7,349.2,440.0,349.2],
  startMusic(){
    if(!this.ctx) return;
    if(this.musicTimer) return;
    const step = ()=>{
      if(this.musicOn){
        const f = this.musicPattern[this.musicStep % this.musicPattern.length];
        this.tone(f, 1.1, {type:'sine', gain:0.05});
        this.tone(f/2, 1.4, {type:'sine', gain:0.035});
      }
      this.musicStep++;
    };
    step();
    this.musicTimer = setInterval(step, 900);
  },
  toggleSfx(){ this.sfxOn = !this.sfxOn; store.set('sfxOn', this.sfxOn); return this.sfxOn; },
  toggleMusic(){ this.musicOn = !this.musicOn; store.set('musicOn', this.musicOn); return this.musicOn; }
};

function applyTheme(levelIdx){

}

   HUD 更新
   ================================================================= */
function refreshHud(){
  document.getElementById('coin-count').textContent = coins;
  document.getElementById('bulb-count').textContent = bulbs;
  document.getElementById('hint-cost').textContent = '1';
  const pct = ((curLevel % 5) / 5) * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  store.set('coins', coins); store.set('bulbs', bulbs); store.set('level', curLevel);
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toast._tm);
  toast._tm = setTimeout(()=>t.classList.remove('show'), 1600);
}

/* =================================================================
   关卡渲染 (RENDER LEVEL)
   ================================================================= */
let gridState = {}; // "r,c" -> {letter, revealed, bonus}
let wordsSolved = [];

function loadLevel(idx){
  const lvl = LEVELS[idx % LEVELS.length];
  document.getElementById('level-tag').textContent = 'Level ' + (curLevel + 1);
  applyTheme(idx);

  // 建立 grid 坐标映射
  gridState = {}; wordsSolved = lvl.words.map(()=>false);
  let minR=99,maxR=-99,minC=99,maxC=-99;
  lvl.words.forEach(w=>{
    w.word.split('').forEach((ch,i)=>{
      const [r,c] = w.cells[i];
      gridState[r+','+c] = { letter:ch, revealed:false };
      minR=Math.min(minR,r); maxR=Math.max(maxR,r);
      minC=Math.min(minC,c); maxC=Math.max(maxC,c);
    });
  });
  (lvl.bonus||[]).forEach(b=>{
    const key = b.cell[0]+','+b.cell[1];
    if(gridState[key]) gridState[key].bonus = { type:b.type, amount:b.amount, claimed:false };
  });

  const rows = maxR-minR+1, cols = maxC-minC+1;
  const gridEl = document.getElementById('grid-area');
  gridEl.style.gridTemplateColumns = `repeat(${cols}, 58px)`;
  gridEl.style.gridTemplateRows = `repeat(${rows}, 58px)`;
  gridEl.innerHTML = '';
  for(let r=minR; r<=maxR; r++){
    for(let c=minC; c<=maxC; c++){
      const key = r+','+c;
      const cellData = gridState[key];
      const div = document.createElement('div');
      if(cellData){
        div.className = 'tile blank';
        div.id = 'tile-'+key;
        const letterSpan = document.createElement('span');
        letterSpan.className = 'letter'; letterSpan.textContent = cellData.letter;
        div.appendChild(letterSpan);
        if(cellData.bonus){
          const peek = document.createElement('span');
          peek.className = 'peek'; peek.textContent = cellData.bonus.type==='coin' ? '🪙' : '💡';
          div.appendChild(peek);
        }
      } else {
        div.className = 'tile empty';
      }
      gridEl.appendChild(div);
    }
  }

  renderWheel(lvl.letters);
  refreshHud();
}

/* =================================================================
   轮盘渲染与交互 (WHEEL)
   ================================================================= */
let wheelLetters = [];
let dragging = false, selection = [];

function renderWheel(letters){
  wheelLetters = shuffleArr(letters.slice());
  const wrap = document.getElementById('wheel-letters');
  wrap.innerHTML = '';
  const n = wheelLetters.length;
  const radius = 78;
  wheelLetters.forEach((ch,i)=>{
    const angle = (Math.PI*2 * i / n) - Math.PI/2;
    const x = 110 + radius*Math.cos(angle);
    const y = 110 + radius*Math.sin(angle);
    const btn = document.createElement('div');
    btn.className = 'letter-btn';
    btn.textContent = ch;
    btn.style.left = x+'px'; btn.style.top = y+'px';
    btn.dataset.idx = i;
    wrap.appendChild(btn);
  });
  document.getElementById('word-preview').textContent = '';
  clearSelection();
}

function shuffleArr(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function clearSelection(){
  selection = [];
  document.querySelectorAll('.letter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('wheel-line').setAttribute('points','');
  document.getElementById('word-preview').textContent = '';
}

function updateSelectionVisual(){
  document.querySelectorAll('.letter-btn').forEach(b=>b.classList.remove('active'));
  let pts = [];
  selection.forEach(idx=>{
    const b = document.querySelector('.letter-btn[data-idx="'+idx+'"]');
    b.classList.add('active');
    pts.push((parseFloat(b.style.left)+28)+','+(parseFloat(b.style.top)+28));
  });
  document.getElementById('wheel-line').setAttribute('points', pts.join(' '));
  document.getElementById('word-preview').textContent = selection.map(i=>wheelLetters[i]).join('');
}

function pointFromEvent(e){
  return e.touches && e.touches.length ? e.touches[0] : e;
}

function letterBtnAt(x,y){
  const el = document.elementFromPoint(x,y);
  return el && el.classList.contains('letter-btn') ? el : null;
}

function initWheelEvents(){
  const zone = document.getElementById('wheel-outer');
  const start = (e)=>{
    const p = pointFromEvent(e);
    const btn = letterBtnAt(p.clientX, p.clientY);
    if(!btn) return;
    dragging = true; selection = [parseInt(btn.dataset.idx)];
    updateSelectionVisual();
    AudioEngine.playTap();
    e.preventDefault();
  };
  const move = (e)=>{
    if(!dragging) return;
    const p = pointFromEvent(e);
    const btn = letterBtnAt(p.clientX, p.clientY);
    if(btn){
      const idx = parseInt(btn.dataset.idx);
      if(selection[selection.length-1] !== idx && !selection.includes(idx)){
        selection.push(idx); updateSelectionVisual();
        AudioEngine.playTap();
      }
    }
    e.preventDefault();
  };
  const end = ()=>{
    if(!dragging) return;
    dragging = false;
    submitWord();
  };
  zone.addEventListener('mousedown', start);
  zone.addEventListener('mousemove', move);
  window.addEventListener('mouseup', end);
  zone.addEventListener('touchstart', start, {passive:false});
  zone.addEventListener('touchmove', move, {passive:false});
  zone.addEventListener('touchend', end);
}

function submitWord(){
  const word = selection.map(i=>wheelLetters[i]).join('');
  const lvl = LEVELS[curLevel % LEVELS.length];
  let matched = -1;
  lvl.words.forEach((w,i)=>{ if(w.word === word && !wordsSolved[i]) matched = i; });
  if(matched >= 0){
    AudioEngine.playCorrect();
    revealWord(lvl.words[matched]);
    wordsSolved[matched] = true;
    if(wordsSolved.every(Boolean)) setTimeout(completeLevel, 500);
  } else if(word.length>0){
    AudioEngine.playWrong();
    toast('Try again');
  }
  clearSelection();
}

function revealWord(w){
  w.cells.forEach(([r,c],i)=>{
    setTimeout(()=>{
      const key = r+','+c;
      const tile = document.getElementById('tile-'+key);
      if(!tile) return;
      tile.classList.add('revealed','bounce');
      const cellData = gridState[key];
      if(cellData && cellData.bonus && !cellData.bonus.claimed){
        cellData.bonus.claimed = true;
        if(cellData.bonus.type === 'coin'){ coins += cellData.bonus.amount; toast('+'+cellData.bonus.amount+' coins'); AudioEngine.playCoin(); }
        else { bulbs += cellData.bonus.amount; toast('+'+cellData.bonus.amount+' bulb'); AudioEngine.playBulb(); }
        refreshHud();
      }
    }, i*90);
  });
}

/* =================================================================
   提示 (HINT)
   ================================================================= */
document.getElementById('btn-hint').addEventListener('click', ()=>{
  if(bulbs < 1){ toast('Not enough bulbs'); return; }
  const blanks = Object.keys(gridState).filter(k=>!gridState[k].revealed);
  if(!blanks.length) return;
  const key = blanks[Math.floor(Math.random()*blanks.length)];
  gridState[key].revealed = true;
  const tile = document.getElementById('tile-'+key);
  if(tile) tile.classList.add('revealed','bounce');
  bulbs -= 1; refreshHud();
  checkAutoCompleteWords();
});

function checkAutoCompleteWords(){
  const lvl = LEVELS[curLevel % LEVELS.length];
  let allDone = true;
  lvl.words.forEach((w,i)=>{
    if(wordsSolved[i]) return;
    const done = w.cells.every(([r,c])=> gridState[r+','+c].revealed);
    if(done) wordsSolved[i] = true;
  });
  wordsSolved.forEach(v=>{ if(!v) allDone = false; });
  if(allDone) setTimeout(completeLevel, 400);
}

/* =================================================================
   过关 / 进度 (LEVEL COMPLETE / PROGRESS)
   ================================================================= */
function completeLevel(){
  AudioEngine.playLevelComplete();
  const reward = 20 + curLevel*5;
  coins += reward;
  document.getElementById('complete-rewards').innerHTML =
    `<div class="reward-chip"><span class="icon-circle coin">🪙</span><span class="amt">+${reward}</span></div>`;
  openModal('modal-complete');
  curLevel += 1;
  refreshHud();
  if(curLevel % 5 === 0) pendingGift = true;
}
let pendingGift = false;

document.getElementById('btn-next-level').addEventListener('click', ()=>{
  closeModal('modal-complete');
  if(pendingGift){ pendingGift = false; showMysteryGift(); }
  else loadLevel(curLevel);
});

function showMysteryGift(){
  AudioEngine.playGift();
  const coinAmt = 40 + Math.floor(Math.random()*40);
  document.getElementById('gift-rewards').innerHTML = `
    <div class="reward-chip"><span class="icon-circle coin">🪙</span><span class="amt">+${coinAmt}</span></div>
    <div class="reward-chip"><span class="icon-circle bulb">💡</span><span class="amt">+1</span></div>`;
  coins += coinAmt; bulbs += 1; refreshHud();
  openModal('modal-gift');
}
document.getElementById('btn-gift-claim').addEventListener('click', ()=>{
  closeModal('modal-gift'); loadLevel(curLevel);
});

/* =================================================================
   转盘抽奖 (SPIN WHEEL)
   ================================================================= */
const SPIN_SEGMENTS = [
  {label:'20', type:'coin', amount:20, color:'#49c6e0'},
  {label:'💡', type:'bulb', amount:1,  color:'#ff7096'},
  {label:'50', type:'coin', amount:50, color:'#f6b93b'},
  {label:'10', type:'coin', amount:10, color:'#7be7c1'},
  {label:'100',type:'coin', amount:100,color:'#c97a1a'},
  {label:'15', type:'coin', amount:15, color:'#6fb3f0'},
  {label:'75', type:'coin', amount:75, color:'#8de3a4'},
  {label:'💡', type:'bulb', amount:1,  color:'#ff9dbb'},
];
function buildSpinWheel(){
  const svg = document.getElementById('spin-wheel-svg');
  const n = SPIN_SEGMENTS.length, cx=100, cy=100, r=95;
  let html = '';
  SPIN_SEGMENTS.forEach((seg,i)=>{
    const a0 = (Math.PI*2*i/n) - Math.PI/2, a1 = (Math.PI*2*(i+1)/n) - Math.PI/2;
    const x0 = cx+r*Math.cos(a0), y0 = cy+r*Math.sin(a0);
    const x1 = cx+r*Math.cos(a1), y1 = cy+r*Math.sin(a1);
    html += `<path d="M${cx},${cy} L${x0},${y0} A${r},${r} 0 0 1 ${x1},${y1} Z" fill="${seg.color}" stroke="#fff" stroke-width="2"/>`;
    const am = (a0+a1)/2, lx = cx+r*0.62*Math.cos(am), ly = cy+r*0.62*Math.sin(am);
    html += `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="middle" font-family="Baloo 2" font-weight="800" font-size="16" fill="#1c2b4a">${seg.label}</text>`;
  });
  svg.innerHTML = html;
}
buildSpinWheel();

function isNewDay(){
  const today = new Date().toDateString();
  const last = store.get('lastSpinDay', '');
  return today !== last;
}
function updateSpinButton(){
  const btn = document.getElementById('btn-spin');
  if(isNewDay()){ btn.className='free'; btn.textContent='SPIN (FREE)'; }
  else { btn.className='ad'; btn.textContent='📺 SPIN (WATCH AD)'; }
}
document.getElementById('btn-spin-open').addEventListener('click', ()=>{ updateSpinButton(); openModal('modal-spin'); });

let spinning = false;
document.getElementById('btn-spin').addEventListener('click', ()=>{
  if(spinning) return;
  const free = isNewDay();
  const doSpin = ()=>{
    spinning = true;
    const idx = Math.floor(Math.random()*SPIN_SEGMENTS.length);
    const seg = SPIN_SEGMENTS[idx];
    const n = SPIN_SEGMENTS.length;
    const targetAngle = 360*4 + (360 - (idx*(360/n)) - (360/n/2));
    const svg = document.getElementById('spin-wheel-svg');
    svg.style.transform = `rotate(${targetAngle}deg)`;
    setTimeout(()=>{
      spinning = false;
      if(seg.type==='coin'){ coins += seg.amount; toast('+'+seg.amount+' coins'); }
      else { bulbs += seg.amount; toast('+'+seg.amount+' bulb'); }
      refreshHud();
      if(free) store.set('lastSpinDay', new Date().toDateString());
      updateSpinButton();
    }, 3300);
  };
  if(free){ doSpin(); }
  else {
    // 广告位：正式上线后在此处调用真实广告SDK，回调成功后再执行 doSpin()
    const btn = document.getElementById('btn-spin');
    btn.textContent = 'Loading ad…'; btn.disabled = true;
    setTimeout(()=>{ btn.disabled=false; doSpin(); }, 1400);
  }
});

/* =================================================================
   弹窗控制 & 其它按钮
   ================================================================= */
function openModal(id){ document.getElementById(id).style.display='flex'; }
function closeModal(id){ document.getElementById(id).style.display='none'; }
document.querySelectorAll('[data-close]').forEach(b=>b.addEventListener('click', ()=>closeModal(b.dataset.close)));
document.getElementById('btn-settings').addEventListener('click', ()=>openModal('modal-settings'));
document.getElementById('btn-home').addEventListener('click', ()=>{
  closeModal('modal-settings');
  document.getElementById('screen-game').style.display='none';
  document.getElementById('screen-start').style.display='flex';
});
function refreshSoundButtons(){
  const sBtn = document.getElementById('btn-sound');
  const mBtn = document.getElementById('btn-music');
  sBtn.textContent = AudioEngine.sfxOn ? '🔊' : '🔇';
  mBtn.textContent = AudioEngine.musicOn ? '🎵' : '🔈';
  sBtn.style.opacity = AudioEngine.sfxOn ? '1' : '.5';
  mBtn.style.opacity = AudioEngine.musicOn ? '1' : '.5';
}
document.getElementById('btn-sound').addEventListener('click', ()=>{ AudioEngine.toggleSfx(); if(AudioEngine.sfxOn) AudioEngine.playTap(); refreshSoundButtons(); });
document.getElementById('btn-music').addEventListener('click', ()=>{ AudioEngine.toggleMusic(); refreshSoundButtons(); });
document.getElementById('wheel-shuffle').addEventListener('click', ()=>{
  const lvl = LEVELS[curLevel % LEVELS.length];
  renderWheel(lvl.letters);
});

/* =================================================================
   启动 (BOOT)
   ================================================================= */
document.getElementById('btn-start').addEventListener('click', ()=>{
  AudioEngine.init();
  AudioEngine.startMusic();
  refreshSoundButtons();
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-game').style.display='block';
  initWheelEvents();
  loadLevel(curLevel);
});
applyTheme(0);
</script>
